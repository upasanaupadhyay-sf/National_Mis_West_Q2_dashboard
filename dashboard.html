<!doctype html><html><head><meta charset="utf-8">
<title>National MIS – West Q2 2026 · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
body{margin:0;background:#0f172a;color:#e2e8f0}
header{background:#1e293b;padding:14px 22px;border-bottom:2px solid #334155;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
h1{margin:0;font-size:20px;color:#f1f5f9}
.sub{color:#94a3b8;font-size:12px;margin-top:4px}
.wrap{padding:16px 22px}
.filters{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;background:#1e293b;padding:14px;border-radius:8px;margin-bottom:14px}
.filters label{display:block;font-size:11px;text-transform:uppercase;color:#94a3b8;margin-bottom:4px;letter-spacing:.5px}
.filters select,.filters input{width:100%;padding:6px 8px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:4px;font-size:12px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#1e293b;padding:14px;border-radius:8px;border-left:3px solid #3b82f6}
.kpi .l{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.kpi .v{font-size:24px;font-weight:700;color:#f1f5f9;margin-top:4px}
.kpi.ok{border-color:#22c55e}.kpi.bad{border-color:#ef4444}.kpi.warn{border-color:#f59e0b}
.card{background:#1e293b;padding:14px;border-radius:8px;margin-bottom:14px}
.card h3{margin:0 0 10px 0;font-size:13px;color:#cbd5e1;text-transform:uppercase;letter-spacing:.5px}
.tabs{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.tabs button{background:#0f172a;color:#94a3b8;border:1px solid #334155;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:11px}
.tabs button.on{background:#3b82f6;color:white;border-color:#3b82f6}
table{width:100%;border-collapse:collapse;font-size:11px}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid #334155}
th{color:#94a3b8;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px}
tr:hover td{background:#0f172a}
.pct{font-weight:600}
.lo{color:#ef4444}.hi{color:#22c55e}
.scroll{max-height:340px;overflow:auto}
canvas{max-height:260px}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.chip.ok{background:#14532d;color:#86efac}.chip.bad{background:#7f1d1d;color:#fca5a5}.chip.pn{background:#374151;color:#d1d5db}
.updated{font-size:11px;color:#64748b;white-space:nowrap}
</style></head><body>
<header>
  <div><h1>National MIS – West Q2 2026 · Dashboard</h1><div class="sub" id="sub">Loading…</div></div>
  <div class="updated" id="updatedAt"></div>
</header>
<div class="wrap">

<!-- ── Filters ── -->
<div class="filters">
  <div><label>Month</label><select id="fM"></select></div>
  <div><label>Week</label><select id="fW"></select></div>
  <div><label>Lane</label><select id="fL"></select></div>
  <div><label>Origin</label><select id="fO"></select></div>
  <div><label>Vendor</label><select id="fV"></select></div>
  <div><label>Type</label><select id="fT"></select></div>
  <div><label>Status</label><select id="fSt"></select></div>
  <div><label>Date From</label><input type="date" id="fDf"></div>
  <div><label>Date To</label><input type="date" id="fDt"></div>
  <div style="align-self:end"><button onclick="reset()" style="width:100%;padding:6px;background:#3b82f6;color:white;border:0;border-radius:4px;cursor:pointer;font-size:12px">Reset</button></div>
</div>

<!-- ── KPI Cards ── -->
<div class="kpis" id="kpis"></div>

<!-- ── Weekly Performance Summary ── -->
<div class="card"><h3>Weekly Performance Summary (%)</h3>
<div class="scroll"><table id="tWK"></table></div></div>

<!-- ── Top Breached Lanes ── -->
<div class="card"><h3>Top Breached Lanes – Running TAT (Trip Closed)</h3>
<div class="tabs">
  <button class="on" data-d="0">Today</button>
  <button data-d="1">Yesterday</button>
  <button data-d="2">Day Before</button>
  <button data-d="W">Week</button>
</div>
<div class="scroll"><table id="tBR"></table></div></div>

<!-- ── Chronic Lanes ── -->
<div class="card"><h3>Chronic Lanes – Weekly Running Performance %</h3>
<div class="scroll"><table id="tCH"></table></div></div>

<!-- ── Vendor Performance ── -->
<div class="card"><h3>Vendor Weekly Running Performance %</h3>
<div class="scroll"><table id="tVN"></table></div></div>

<!-- ── Trip Detail ── -->
<div class="card"><h3>Trip Detail (filtered)</h3>
<div style="margin-bottom:8px">
  <label style="font-size:11px;color:#94a3b8;text-transform:uppercase;margin-right:6px">Status:</label>
  <select id="fDtSt" style="padding:5px 8px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:4px;font-size:12px">
    <option value="">All</option>
    <option value="Ontime">Ontime</option>
    <option value="Breached">Breached</option>
  </select>
</div>
<div class="scroll"><table id="tDT"></table></div></div>

</div><!-- /wrap -->

<script>
// @@DATA_INJECT@@
// Live data injected by build.py — do not edit this block manually
const D = window.__LIVE_DATA__ || [];

// ── Populate filters ──────────────────────────────────────────
function populateSel(id, vals, label) {
  const s = document.getElementById(id);
  s.innerHTML = `<option value="">All ${label}</option>` +
    [...vals].sort().map(v => `<option value="${v}">${v}</option>`).join('');
}
function initFilters() {
  const months  = [...new Set(D.map(r => r.d ? r.d.slice(0,7) : null).filter(Boolean))].sort();
  const weeks   = [...new Set(D.map(r => r.w).filter(Boolean))].sort((a,b)=>parseInt(b.replace(/\D/g,''))-parseInt(a.replace(/\D/g,'')));
  const lanes   = [...new Set(D.map(r => r.l).filter(Boolean))];
  const origins = [...new Set(D.map(r => r.o).filter(Boolean))];
  const vendors = [...new Set(D.map(r => r.v).filter(Boolean))];
  const types   = [...new Set(D.map(r => r.t).filter(Boolean))];
  const stats   = [...new Set(D.map(r => r.st).filter(Boolean))];

  const mSel = document.getElementById('fM');
  mSel.innerHTML = '<option value="">All Months</option>' + months.map(m=>`<option value="${m}">${m}</option>`).join('');
  const wSel = document.getElementById('fW');
  wSel.innerHTML = '<option value="">All Weeks</option>' + weeks.map(w=>`<option value="${w}">${w}</option>`).join('');

  populateSel('fL', lanes,   'Lanes');
  populateSel('fO', origins, 'Origins');
  populateSel('fV', vendors, 'Vendors');
  populateSel('fT', types,   'Types');
  populateSel('fSt',stats,   'Status');
}

// ── Filter function ───────────────────────────────────────────
function flt() {
  const v = id => document.getElementById(id).value;
  const fL=v('fL'),fO=v('fO'),fV=v('fV'),fT=v('fT'),fM=v('fM'),fW=v('fW'),fSt=v('fSt'),fDf=v('fDf'),fDt=v('fDt');
  return D.filter(r =>
    (!fL  || r.l === fL)  &&
    (!fO  || r.o === fO)  &&
    (!fV  || r.v === fV)  &&
    (!fT  || r.t === fT)  &&
    (!fM  || r.d.startsWith(fM)) &&
    (!fW  || r.w === fW)  &&
    (!fSt || r.st === fSt) &&
    (!fDf || r.d >= fDf)  &&
    (!fDt || r.d <= fDt)
  );
}

function reset() {
  ['fM','fW','fL','fO','fV','fT','fSt'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fDf').value = '';
  document.getElementById('fDt').value = '';
  refresh();
}

['fM','fW','fL','fO','fV','fT','fSt','fDf','fDt'].forEach(id =>
  document.getElementById(id).addEventListener('change', refresh));

// ── Helpers ───────────────────────────────────────────────────
function avg(a) { a=a.filter(x=>x!=null&&!isNaN(x)&&x<500); return a.length?a.reduce((s,x)=>s+x,0)/a.length:0; }
function pct(n,d) { return d?(Math.round(n/d*1000)/10).toFixed(1):'0.0'; }
function f1(x) { return (Math.round(x*10)/10).toFixed(1); }
function isClosed(r) { return (r.rS||'').toLowerCase().includes('closed'); }

// ── Main refresh ─────────────────────────────────────────────
function refresh() {
  const Fall = flt();
  const F = Fall.filter(r => isClosed(r));
  const tot = F.length;
  const ot  = F.filter(r => r.st === 'On Time').length;
  const br  = F.filter(r => r.st === 'Breached').length;

  // Placement ADH: delay <= 0 h
  const paDen = F.filter(r => r.pl != null).length;
  const pa    = F.filter(r => r.pl != null && r.pl <= 0.0001).length;

  // Departure ADH: STD + 30 min → dp <= 0.5 h
  const daDen = F.filter(r => r.dp != null).length;
  const da    = F.filter(r => r.dp != null && r.dp <= 0.5 + 0.0001).length;

  // Running TAT ADH — use TAT if available, else Overall Performance
  const hasRun = r => r.aR != null && r.rT != null;
  const rpDen = F.filter(r => hasRun(r) || r.st).length;
  const rp    = F.filter(r => hasRun(r) ? r.aR <= r.rT+0.0001 : r.st === 'On Time').length;

  const aTAT = avg(F.map(r => r.aR));
  const dTAT = avg(F.map(r => r.rT));

  document.getElementById('sub').textContent =
    `${tot.toLocaleString()} trips · ${new Set(F.map(r=>r.l)).size} lanes · ${new Set(F.map(r=>r.v)).size} vendors`;

  const otp = parseFloat(pct(ot,ot+br));
  const pap = parseFloat(pct(pa,paDen));
  const dap = parseFloat(pct(da,daDen));
  const rpp = parseFloat(pct(rp,rpDen));

  const k = [
    ['Total Trips',        tot.toLocaleString(),    ''],
    ['On-Time %',          otp.toFixed(1)+'%',      otp>=90?'ok':'bad'],
    ['Breached',           br,                       'bad'],
    ['Placement Adh.',     pap.toFixed(1)+'%',      pap>=90?'ok':'warn'],
    ['Departure Adh. (STD+30m)', dap.toFixed(1)+'%', dap>=90?'ok':'warn'],
    ['Running Perf.',      rpp.toFixed(1)+'%',      rpp>=90?'ok':'warn'],
    ['Avg Actual Run TAT', f1(aTAT)+'h',            ''],
    ['Avg Design Run TAT', f1(dTAT)+'h',            ''],
  ];
  document.getElementById('kpis').innerHTML = k.map(x =>
    `<div class="kpi ${x[2]}"><div class="l">${x[0]}</div><div class="v">${x[1]}</div></div>`
  ).join('');

  // ── Weekly summary ─────────────────────────────────────────
  const wks = {};
  F.forEach(r => {
    if (!r.w) return;
    if (!wks[r.w]) wks[r.w] = {ot:0,br:0,dT:[],aT:[],dR:[],aR:[],pl:0,plD:0,dp:0,dpD:0};
    const w = wks[r.w];
    if (r.st==='On Time')  w.ot++;
    if (r.st==='Breached') w.br++;
    if (r.dT!=null) w.dT.push(r.dT);
    if (r.aT!=null) w.aT.push(r.aT);
    if (r.rT!=null) w.dR.push(r.rT);
    if (r.aR!=null) w.aR.push(r.aR);
    if (r.pl!=null) { w.plD++; if(r.pl<=0.0001) w.pl++; }
    if (r.dp!=null) { w.dpD++; if(r.dp<=0.5+0.0001) w.dp++; }
  });
  const wkN = Object.keys(wks).sort((a,b)=>parseInt(b.replace(/\D/g,''))-parseInt(a.replace(/\D/g,'')));
  const cls = v => v>=90?'hi':'lo';
  const tWK = document.getElementById('tWK');
  const wRows = wkN.map(w => {
    const W = wks[w];
    const plP = parseFloat(pct(W.pl,W.plD));
    const dpP = parseFloat(pct(W.dp,W.dpD));
    const dRa = avg(W.dR), aRa = avg(W.aR), dTa = avg(W.dT), aTa = avg(W.aT);
    const runOK = W.aR.filter((v,i) => v <= W.dR[i]+0.0001).length;
    const runP  = parseFloat(pct(runOK, W.aR.length));
    const totOK = W.aT.filter((v,i) => v <= W.dT[i]+0.0001).length;
    const totP  = parseFloat(pct(totOK, W.aT.length));
    const wkTot = W.ot+W.br;
    const otP   = parseFloat(pct(W.ot,wkTot));
    return {w,plP,dpP,dRa,aRa,runP,dTa,aTa,totP,ot:W.ot,br:W.br,otP};
  });
  tWK.innerHTML =
    '<thead><tr>' +
    '<th>Week</th><th>Placement Adh %</th><th>Departure Adh % (STD+30m)</th>' +
    '<th>Avg Design Run TAT</th><th>Avg Actual Run TAT</th><th>Run TAT Adh %</th>' +
    '<th>Avg Design Tot TAT</th><th>Avg Actual Tot TAT</th><th>Tot TAT Adh %</th>' +
    '<th>On Time</th><th>Breached</th><th>On-Time %</th>' +
    '</tr></thead><tbody>' +
    wRows.map(r =>
      `<tr><td>${r.w}</td>` +
      `<td class="${cls(r.plP)}">${r.plP.toFixed(1)}%</td>` +
      `<td class="${cls(r.dpP)}">${r.dpP.toFixed(1)}%</td>` +
      `<td>${f1(r.dRa)}</td><td>${f1(r.aRa)}</td>` +
      `<td class="${cls(r.runP)}">${r.runP.toFixed(1)}%</td>` +
      `<td>${f1(r.dTa)}</td><td>${f1(r.aTa)}</td>` +
      `<td class="${cls(r.totP)}">${r.totP.toFixed(1)}%</td>` +
      `<td class="hi">${r.ot}</td><td class="lo">${r.br}</td>` +
      `<td class="${cls(r.otP)}">${r.otP.toFixed(1)}%</td></tr>`
    ).join('') + '</tbody>';

  renderBreach(F);
  renderChronic(F);
  renderVendor(F);
  renderDetail(F);
}

// ── Breached lanes ────────────────────────────────────────────
let brTab = 0;
document.querySelectorAll('.tabs button').forEach(b => b.addEventListener('click', e => {
  document.querySelectorAll('.tabs button').forEach(x => x.classList.remove('on'));
  e.target.classList.add('on');
  brTab = e.target.dataset.d === 'W' ? 'W' : parseInt(e.target.dataset.d);
  renderBreach(flt().filter(r => isClosed(r)));
}));

function renderBreach(F) {
  const closed = F.filter(r => isClosed(r) && r.sta);
  let pool;
  if (brTab === 'W') {
    const wkSel = document.getElementById('fW').value;
    if (wkSel) {
      pool = closed.filter(r => r.w === wkSel);
    } else {
      const wks = [...new Set(closed.map(r=>r.w).filter(Boolean))].sort((a,b)=>parseInt(b.replace(/\D/g,''))-parseInt(a.replace(/\D/g,'')));
      pool = closed.filter(r => r.w === wks[0]);
    }
  } else {
    const dates = [...new Set(closed.map(r=>r.sta))].sort().reverse();
    pool = closed.filter(r => r.sta === dates[brTab]);
  }
  const isBr = r => r.aR!=null && r.rT!=null ? r.aR > r.rT+0.0001 : r.st === 'Breached';
  const lanes = {};
  pool.forEach(r => {
    const k = r.l || 'Unknown';
    if (!lanes[k]) lanes[k] = {l:r.l, o:r.o, t:0, br:0, delay:0, dates:new Set(), wks:new Set()};
    lanes[k].t++;
    if (isBr(r)) {
      lanes[k].br++;
      lanes[k].delay += Math.max(0, r.aR - r.rT);
      lanes[k].dates.add(r.sta);
      if (r.w) lanes[k].wks.add(r.w);
    }
  });
  const arr = Object.values(lanes).filter(x=>x.br>0).sort((a,b)=>b.br-a.br||b.delay-a.delay);
  const isWk = brTab === 'W';
  document.getElementById('tBR').innerHTML =
    `<thead><tr><th>${isWk?'Week':'Date'}</th><th>Lane</th><th>Origin</th><th>Trips</th><th>Breached</th><th>Breach%</th><th>Avg Delay (h)</th></tr></thead><tbody>` +
    arr.map(x =>
      `<tr><td>${isWk
        ? [...x.wks].sort((a,b)=>parseInt(b.replace(/\D/g,''))-parseInt(a.replace(/\D/g,''))).join(', ')
        : [...x.dates].sort().reverse().join(', ')
      }</td><td>${x.l||''}</td><td>${x.o||''}</td><td>${x.t}</td>` +
      `<td class="lo">${x.br}</td><td class="pct lo">${pct(x.br,x.t)}%</td><td>${f1(x.delay/x.br)}</td></tr>`
    ).join('') + '</tbody>';
}

// ── Chronic lanes ─────────────────────────────────────────────
function renderChronic(F) {
  const lanes = {}, vens = {}, wks = new Set();
  F.forEach(r => {
    if (!r.w) return;
    // Use running TAT comparison if available, else fall back to Overall Performance
    const hasRun = r.aR != null && r.rT != null;
    const isOK   = hasRun ? (r.aR <= r.rT + 0.0001) : (r.st === 'On Time');
    wks.add(r.w);
    const k = r.l || 'Unknown';
    if (!lanes[k]) lanes[k] = {};
    if (!lanes[k][r.w]) lanes[k][r.w] = {ok:0, t:0};
    lanes[k][r.w].t++;
    if (isOK) lanes[k][r.w].ok++;
    if (r.v) { if(!vens[k]) vens[k]={}; vens[k][r.v]=(vens[k][r.v]||0)+1; }
  });
  const topV = k => { const m=vens[k]; if(!m)return ''; return Object.entries(m).sort((a,b)=>b[1]-a[1])[0][0]; };
  const wkN = [...wks].sort((a,b)=>parseInt(b.replace(/\D/g,''))-parseInt(a.replace(/\D/g,'')));
  const recentW = wkN[0];
  const arr = Object.entries(lanes).map(([k,v]) => {
    const row = {lane:k, vendor:topV(k), _wT:{}};
    let lo=0, tot=0;
    wkN.forEach(w => {
      if (v[w]) { const p=parseFloat(pct(v[w].ok,v[w].t)); row[w]=p; row._wT[w]=v[w].t; tot+=v[w].t; if(p<90)lo++; }
      else { row[w]=''; row._wT[w]=0; }
    });
    row._lo=lo; row._tot=tot; row._rT=row._wT[recentW]||0;
    return row;
  }).filter(x=>x._lo>=2).sort((a,b)=>b._rT-a._rT||b._tot-a._tot).slice(0,30);

  document.getElementById('tCH').innerHTML =
    '<thead><tr><th>Lane</th><th>Top Vendor</th>' +
    wkN.map(w=>`<th>${w} %</th><th>${w} Trips</th>`).join('') +
    '<th>Low Wks</th><th>Total Trips</th></tr></thead><tbody>' +
    arr.map(r =>
      `<tr><td>${r.lane}</td><td>${r.vendor}</td>` +
      wkN.map(w => {
        const v=r[w], c=r._wT[w]||0;
        if(v==='') return '<td>-</td><td>-</td>';
        return `<td class="${v<90?'lo':'hi'}">${v.toFixed(1)}%</td><td>${c}</td>`;
      }).join('') +
      `<td class="lo">${r._lo}</td><td>${r._tot}</td></tr>`
    ).join('') + '</tbody>';
}

// ── Vendor performance ────────────────────────────────────────
function renderVendor(F) {
  const ven = {}, wks = new Set();
  F.forEach(r => {
    if (!r.w || !r.v) return;
    const hasRun = r.aR != null && r.rT != null;
    const isOK   = hasRun ? (r.aR <= r.rT + 0.0001) : (r.st === 'On Time');
    wks.add(r.w);
    if (!ven[r.v]) ven[r.v] = {};
    if (!ven[r.v][r.w]) ven[r.v][r.w] = {ok:0, t:0};
    ven[r.v][r.w].t++;
    if (isOK) ven[r.v][r.w].ok++;
  });
  const wkN = [...wks].sort((a,b)=>parseInt(b.replace(/\D/g,''))-parseInt(a.replace(/\D/g,'')));
  const arr = Object.entries(ven).map(([k,v]) => {
    const row = {vendor:k, _w:{}};
    let tot=0, ok=0;
    wkN.forEach(w => {
      if (v[w]) { row[w]=parseFloat(pct(v[w].ok,v[w].t)); row._w[w]=v[w].t; tot+=v[w].t; ok+=v[w].ok; }
      else { row[w]=null; row._w[w]=0; }
    });
    row._avg = tot ? parseFloat(pct(ok,tot)) : 0;
    row._tot = tot;
    return row;
  });
  const sortWk = wkN[0];
  arr.sort((a,b)=>(b._w[sortWk]||0)-(a._w[sortWk]||0)||b._tot-a._tot);
  document.getElementById('tVN').innerHTML =
    '<thead><tr><th>Vendor</th>' +
    wkN.map(w=>`<th>${w} %</th><th>${w} Trips</th>`).join('') +
    '<th>Overall %</th><th>Total Trips</th></tr></thead><tbody>' +
    arr.map(r =>
      `<tr><td>${r.vendor}</td>` +
      wkN.map(w => {
        const v=r[w], c=r._w[w];
        if(v==null) return '<td>-</td><td>-</td>';
        return `<td class="${v<90?'lo':'hi'}">${v.toFixed(1)}%</td><td>${c}</td>`;
      }).join('') +
      `<td class="${r._avg<90?'lo':'hi'}">${r._avg.toFixed(1)}%</td><td>${r._tot}</td></tr>`
    ).join('') + '</tbody>';
}

// ── Trip detail table ─────────────────────────────────────────
document.getElementById('fDtSt').addEventListener('change', () => renderDetail(flt()));
function renderDetail(F) {
  const sf = document.getElementById('fDtSt').value;
  let pool = F.map(r => ({...r, _lbl: r.st==='On Time'?'Ontime':'Breached'}));
  if (sf) pool = pool.filter(r => r._lbl === sf);
  const rows = pool.slice(0, 300);
  const fm = v => v==null ? '' : f1(v);
  document.getElementById('tDT').innerHTML =
    '<thead><tr>' +
    '<th>Date</th><th>Lane</th><th>Origin</th><th>Vendor</th><th>Type</th>' +
    '<th>Pl Δ (h)</th><th>Dep Δ (h)</th><th>D-Run</th><th>A-Run</th><th>D-Tot</th><th>A-Tot</th><th>Status</th>' +
    '</tr></thead><tbody>' +
    rows.map(r => {
      const lbl=r._lbl, c=lbl==='Ontime'?'ok':'bad';
      return `<tr><td>${r.d}</td><td>${r.l||''}</td><td>${r.o||''}</td><td>${r.v||''}</td><td>${r.t||''}</td>` +
        `<td>${fm(r.pl)}</td><td>${fm(r.dp)}</td><td>${fm(r.rT)}</td><td>${fm(r.aR)}</td>` +
        `<td>${fm(r.dT)}</td><td>${fm(r.aT)}</td><td><span class="chip ${c}">${lbl}</span></td></tr>`;
    }).join('') + '</tbody>';
  if (pool.length > 300)
    document.getElementById('tDT').innerHTML +=
      `<caption style="color:#94a3b8;font-size:11px;padding:6px">Showing first 300 of ${pool.length}</caption>`;
}

// ── Updated timestamp ─────────────────────────────────────────
function showUpdated() {
  const el = document.getElementById('updatedAt');
  if (window.__LIVE_META__ && window.__LIVE_META__.updated)
    el.textContent = 'Last updated: ' + window.__LIVE_META__.updated;
}

// ── Boot ──────────────────────────────────────────────────────
initFilters();
showUpdated();
refresh();
</script>
</body></html>
