h1{margin:0;font-size:20px;color:#f1f5f9}
.sub{color:#94a3b8;font-size:12px;margin-top:4px}
.wrap{padding:16px 22px}
.filters{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;background:#1e293b;padding:14px;border-radius:8px;margin-bottom:14px}
.filters label{display:block;font-size:11px;text-transform:uppercase;color:#94a3b8;margin-bottom:4px;letter-spacing:.5px}
.filters select,.filters input{width:100%;padding:6px 8px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:4px;font-size:12px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#1e293b;padding:14px;border-radius:8px;border-left:3px solid #3b82f6}
.kpi .l{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.kpi .v{font-size:24px;font-weight:700;color:#f1f5f9;margin-top:4px}
.kpi.ok{border-color:#22c55e}.kpi.bad{border-color:#ef4444}.kpi.warn{border-color:#f59e0b}
.card{background:#1e293b;padding:14px;border-radius:8px;margin-bottom:14px}
.card h3{margin:0 0 10px 0;font-size:13px;color:#cbd5e1;text-transform:uppercase;letter-spacing:.5px}
.tabs{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.tabs button{background:#0f172a;color:#94a3b8;border:1px solid #334155;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:11px}
.tabs button.on{background:#3b82f6;color:white;border-color:#3b82f6}
table{width:100%;border-collapse:collapse;font-size:11px}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid #334155}
th{color:#94a3b8;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px}
tr:hover td{background:#0f172a}
.pct{font-weight:600}
.lo{color:#ef4444}.hi{color:#22c55e}
.scroll{max-height:340px;overflow:auto}
canvas{max-height:260px}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.chip.ok{background:#14532d;color:#86efac}.chip.bad{background:#7f1d1d;color:#fca5a5}.chip.pn{background:#374151;color:#d1d5db}
.updated{font-size:11px;color:#64748b;white-space:nowrap}
</style></head><body>

    let lo=0, tot=0;
    wkN.forEach(w => {
      if (v[w]) { const p=parseFloat(pct(v[w].ok,v[w].t)); row[w]=p; row._wT[w]=v[w].t; tot+=v[w].t; if(p<90)lo++; }
      else { row[w]=''; row._wT[w]=0; }
    });
    row._lo=lo; row._tot=tot; row._rT=row._wT[recentW]||0;
    return row;
  }).filter(x=>x._lo>=2).sort((a,b)=>b._rT-a._rT||b._tot-a._tot).slice(0,30);

  document.getElementById('tCH').innerHTML =
    '<thead><tr><th>Lane</th><th>Top Vendor</th>' +
    wkN.map(w=>`<th>${w} %</th><th>${w} Trips</th>`).join('') +
    '<th>Low Wks</th><th>Total Trips</th></tr></thead><tbody>' +
    arr.map(r =>
      `<tr><td>${r.lane}</td><td>${r.vendor}</td>` +
      wkN.map(w => {
        const v=r[w], c=r._wT[w]||0;
        if(v==='') return '<td>-</td><td>-</td>';
        return `<td class="${v<90?'lo':'hi'}">${v.toFixed(1)}%</td><td>${c}</td>`;
      }).join('') +
      `<td class="lo">${r._lo}</td><td>${r._tot}</td></tr>`
    ).join('') + '</tbody>';
}

// ── Vendor performance ────────────────────────────────────────
function renderVendor(F) {
  const ven = {}, wks = new Set();
  F.forEach(r => {
    if (!r.w || r.aR==null || r.rT==null || !r.v) return;
    wks.add(r.w);
    if (!ven[r.v]) ven[r.v] = {};
    if (!ven[r.v][r.w]) ven[r.v][r.w] = {ok:0, t:0};
    ven[r.v][r.w].t++;
    if (r.aR <= r.rT+0.0001) ven[r.v][r.w].ok++;
  });
  const wkN = [...wks].sort((a,b)=>parseInt(b.replace(/\D/g,''))-parseInt(a.replace(/\D/g,'')));
  const arr = Object.entries(ven).map(([k,v]) => {
    const row = {vendor:k, _w:{}};
    let tot=0, ok=0;
    wkN.forEach(w => {
      if (v[w]) { row[w]=parseFloat(pct(v[w].ok,v[w].t)); row._w[w]=v[w].t; tot+=v[w].t; ok+=v[w].ok; }
      else { row[w]=null; row._w[w]=0; }
    });
    row._avg = tot ? parseFloat(pct(ok,tot)) : 0;
    row._tot = tot;
    return row;
  });
  const sortWk = wkN[0];
  arr.sort((a,b)=>(b._w[sortWk]||0)-(a._w[sortWk]||0)||b._tot-a._tot);
  document.getElementById('tVN').innerHTML =
    '<thead><tr><th>Vendor</th>' +
    wkN.map(w=>`<th>${w} %</th><th>${w} Trips</th>`).join('') +
    '<th>Overall %</th><th>Total Trips</th></tr></thead><tbody>' +
    arr.map(r =>
      `<tr><td>${r.vendor}</td>` +
      wkN.map(w => {
        const v=r[w], c=r._w[w];
        if(v==null) return '<td>-</td><td>-</td>';
        return `<td class="${v<90?'lo':'hi'}">${v.toFixed(1)}%</td><td>${c}</td>`;
      }).join('') +
      `<td class="${r._avg<90?'lo':'hi'}">${r._avg.toFixed(1)}%</td><td>${r._tot}</td></tr>`
    ).join('') + '</tbody>';
}

// ── Trip detail table ─────────────────────────────────────────
document.getElementById('fDtSt').addEventListener('change', () => renderDetail(flt()));
function renderDetail(F) {
  const sf = document.getElementById('fDtSt').value;
  let pool = F.map(r => ({...r, _lbl: r.st==='On Time'?'Ontime':'Breached'}));
  if (sf) pool = pool.filter(r => r._lbl === sf);
  const rows = pool.slice(0, 300);
  const fm = v => v==null ? '' : f1(v);
  document.getElementById('tDT').innerHTML =
    '<thead><tr>' +
    '<th>Date</th><th>Lane</th><th>Origin</th><th>Vendor</th><th>Type</th>' +
    '<th>Pl Δ (h)</th><th>Dep Δ (h)</th><th>D-Run</th><th>A-Run</th><th>D-Tot</th><th>A-Tot</th><th>Status</th>' +
    '</tr></thead><tbody>' +
    rows.map(r => {
      const lbl=r._lbl, c=lbl==='Ontime'?'ok':'bad';
      return `<tr><td>${r.d}</td><td>${r.l||''}</td><td>${r.o||''}</td><td>${r.v||''}</td><td>${r.t||''}</td>` +
        `<td>${fm(r.pl)}</td><td>${fm(r.dp)}</td><td>${fm(r.rT)}</td><td>${fm(r.aR)}</td>` +
        `<td>${fm(r.dT)}</td><td>${fm(r.aT)}</td><td><span class="chip ${c}">${lbl}</span></td></tr>`;
    }).join('') + '</tbody>';
  if (pool.length > 300)
    document.getElementById('tDT').innerHTML +=
      `<caption style="color:#94a3b8;font-size:11px;padding:6px">Showing first 300 of ${pool.length}</caption>`;
}

// ── Updated timestamp ─────────────────────────────────────────
function showUpdated() {
  const el = document.getElementById('updatedAt');
  if (window.__LIVE_META__ && window.__LIVE_META__.updated)
    el.textContent = 'Last updated: ' + window.__LIVE_META__.updated;
}

// ── Boot ──────────────────────────────────────────────────────
initFilters();
showUpdated();
refresh();
</script>
