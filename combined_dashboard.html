<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>National MIS West – Q2 2026 Combined Dashboard</title>
<style>
*{box-sizing:border-box;font-family:-apple-system,Segoe UI,Roboto,sans-serif}
body{margin:0;background:#0f172a;color:#e2e8f0}
header{background:#1e293b;padding:14px 22px;border-bottom:2px solid #334155}
h1{margin:0;font-size:20px;color:#f1f5f9}
.sub{color:#94a3b8;font-size:12px;margin-top:4px}
.wrap{padding:16px 22px}
.filters{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px;background:#1e293b;padding:14px;border-radius:8px;margin-bottom:14px}
.filters label{display:block;font-size:11px;text-transform:uppercase;color:#94a3b8;margin-bottom:4px;letter-spacing:.5px}
.filters select,.filters input{width:100%;padding:6px 8px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:4px;font-size:12px}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:#1e293b;padding:14px;border-radius:8px;border-left:3px solid #3b82f6}
.kpi .l{font-size:11px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px}
.kpi .v{font-size:24px;font-weight:700;color:#f1f5f9;margin-top:4px}
.kpi.ok{border-color:#22c55e}.kpi.bad{border-color:#ef4444}.kpi.warn{border-color:#f59e0b}
.card{background:#1e293b;padding:14px;border-radius:8px;margin-bottom:14px}
.card h3{margin:0 0 10px 0;font-size:13px;color:#cbd5e1;text-transform:uppercase;letter-spacing:.5px}
.tabs{display:flex;gap:6px;margin-bottom:8px}
.tabs button{background:#0f172a;color:#94a3b8;border:1px solid #334155;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:11px}
.tabs button.on{background:#3b82f6;color:white;border-color:#3b82f6}
table{width:100%;border-collapse:collapse;font-size:11px}
th,td{padding:6px 8px;text-align:left;border-bottom:1px solid #334155}
th{color:#94a3b8;font-weight:600;text-transform:uppercase;font-size:10px;letter-spacing:.5px}
tr:hover td{background:#0f172a}
.pct{font-weight:600}
.lo{color:#ef4444}.hi{color:#22c55e}
.scroll{max-height:340px;overflow:auto}
.chip{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.chip.ok{background:#14532d;color:#86efac}.chip.bad{background:#7f1d1d;color:#fca5a5}
</style>
</head>
<body>
<header>
 <h1>National MIS – West Q2 2026 · Combined Dashboard</h1>
 <div class="sub" id="sub">Loading…</div>
</header>
<div class="wrap">

<div class="filters">

</div>

<!-- KPIs -->
<div class="kpis" id="kpis"></div>

<!-- Weekly Performance Summary -->
<div class="card">

</div>

<!-- Top Breached Lanes -->

  <button data-d="W">Week</button>

</div>

<!-- Chronic Lanes -->
<div class="card">

</div>

<!-- Vendor Weekly Performance -->
<div class="card">

</div>

</div>

 tEl.innerHTML='<thead><tr><th>Date</th><th>Lane</th><th>Origin</th><th>Vendor</th><th>Type</th><th>Pl Δ</th><th>Dep Δ</th><th>D-Run</th><th>A-Run</th><th>D-Tot</th><th>A-Tot</th><th>Status</th></tr></thead><tbody>'+rows.map(function(r){var lbl=r._lbl;var c=lbl==='Ontime'?'ok':'bad';return '<tr><td>'+r.d+'</td><td>'+(r.l||'')+'</td><td>'+(r.o||'')+'</td><td>'+(r.v||'')+'</td><td>'+(r.t||'')+'</td><td>'+fm(r.pl)+'</td><td>'+fm(r.dp)+'</td><td>'+fm(r.rT)+'</td><td>'+fm(r.aR)+'</td><td>'+fm(r.dT)+'</td><td>'+fm(r.aT)+'</td><td><span class="chip '+c+'">'+lbl+'</span></td></tr>';}).join('')+'</tbody>';
 if(pool.length>300)tEl.innerHTML+='<caption style="color:#94a3b8;font-size:11px;padding:6px">Showing first 300 of '+pool.length+'</caption>';
}

/* ── Initial render ─────────────────────────────────────── */
try { refresh(); } catch(e) {
 document.getElementById('sub').textContent='ERROR: '+e.message;
 document.getElementById('sub').style.color='#ef4444';
 console.error(e);
}
